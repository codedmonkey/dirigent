parameters:
  env(KERNEL_SECRET_FILE): '/srv/config/secrets/kernel_secret'
  env(ENCRYPTION_KEY_FILE): '/srv/config/secrets/encryption_key'
  env(DECRYPTION_KEY_FILE): '/srv/config/secrets/decryption_key'

framework:
  secret: '%env(file:KERNEL_SECRET_FILE)%'

dirigent:
  encryption:
    private_key: '%env(DECRYPTION_KEY_FILE)%'
    public_key: '%env(ENCRYPTION_KEY_FILE)%'
